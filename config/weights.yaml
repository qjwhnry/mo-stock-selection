# ==============================================================
# 短线选股权重配置（可热调，无需改代码）
#
# 当前执行口径：
# - run-once 实际运行 5 个已实现短线维度：limit / moneyflow / lhb / sector / theme。
# - sentiment 是预留维度，SentimentFilter 尚未接入；固定分母会把缺失维度按 0 分处理。
# - 保留 sentiment=0.10 的目的，是让未来接入新闻/公告情绪后不用重新迁移结果表结构。
# - 因此当前纯规则 rule_score 的理论上限是 90，而不是 100。
# dimension_weights 总和保持 1.00，便于 rule_score 与 AI 分处在稳定的 0-100 量纲。
# ==============================================================

# 6 个权重项；其中前 5 个已实现，sentiment 暂按缺失维度处理。
dimension_weights:
  limit: 0.25       # 异动涨停
  moneyflow: 0.25   # 主力资金流向
  lhb: 0.20         # 龙虎榜（base 60 + seat 40）
  sector: 0.10      # 申万一级行业（v2.1：从 0.15 拆出 0.05 给 theme）
  theme: 0.10       # 同花顺概念 + 涨停最强 + 资金流（v2.1 新增独立维度）
  sentiment: 0.10   # 新闻公告 + 研报情绪（预留；当前未接入 SentimentFilter）

# 规则分 vs AI 分 的融合权重。
# enable_ai=false、swing 自动跳过 AI、或 Claude 调用失败时，final_score 直接等于 rule_score；
# 只有 ai_score 有值时才按 rule_weight / ai_weight 做加权平均。
combine:
  rule_weight: 0.6
  ai_weight: 0.4
  # v2.3：板块多样化 cap —— 最终 Top N 中同一申万一级板块最多入选数。
  # 0 或负值 = 禁用 cap（行为同 v2.2，纯按 final_score 取 TOP N）。
  # 默认 4：Top 20 时强制至少 5 个板块；防止 1 个板块全员霸榜。
  max_stocks_per_sector: 4
  # 无 index_member 映射的股票最多入选数（兜底）。当板块同步失败、全市场都
  # 变成 unknown 时，避免 cap 静默失效。0 = 不限（默认）。
  max_unknown_sector_stocks: 0

# 硬规则：触发任一则直接淘汰（不入 selection_result.picked）
hard_reject:
  # 标的黑名单关键词（匹配股票名称或最近公告标题）
  negative_announcement_keywords:
    - "立案调查"
    - "实际控制人变更"
    - "商誉减值"
    - "财务造假"
    - "暂停上市"
    - "退市风险警示"
  # 仅作板块信号，不推荐次日追高
  exclude_today_limit_up: true
  # 跌停股不推荐（避免"机构抄底"误判，跟 limit_up 对称）
  exclude_today_limit_down: true
  # 当日停牌（amount=0 / NULL）排除（v2 新增）
  exclude_suspended: true
  # 次新过滤：上市不满 N 日
  min_list_days: 60
  # ST / *ST 直接排除
  exclude_st: true

# 涨停维度细则
limit_filter:
  first_board_bonus: 20    # 首板加分
  second_board_bonus: 30   # 连板首日（2 连板）
  open_times_penalty: 10   # 每次开板扣分
  seal_amount_tier:        # 封单额分档加分（亿元）
    - threshold: 1.0
      score: 10
    - threshold: 5.0
      score: 20
    - threshold: 10.0
      score: 30

# 资金流维度细则（满分 100：today 0-50 + ratio 0-30 + rolling 0-20）
moneyflow_filter:
  rolling_3d_bonus: 20            # 近 3 日累计为正再加（上限 0-20）
  big_order_ratio_threshold: 0.4  # 大单+超大单净流入占比阈值（上限 0-30）
  small_up_big_down_penalty: 30   # 小单流入大单流出惩罚
  # today_bonus 连续公式在 _today_bonus_tier 代码中：ratio<0.3%→0, 0.3%~5%→线性5~50, ≥5%→50

# 龙虎榜维度细则（v2.1 重排：base 60 + seat 40）
lhb_filter:
  base_score: 20              # 上榜 + 净买入基础分
  # base 子项的分档值现在硬编码在 lhb_filter._net_rate_tier_bonus / _purity_bonus / _reason_bonus
  # （tier 0-20 / purity 0-12 / reason 0-8），如需调改函数即可。
  # seat 部分（上限 40 / 下限 -15）
  institution:
    min_net_buy_yuan: 10000000
    bonus: 20
  hot_money_buy:
    min_net_buy_yuan: 5000000
    bonus: 12
  hot_money_sell:
    min_net_sell_yuan: 10000000
    penalty: 15
  northbound_buy:
    min_net_buy_yuan: 30000000
    bonus: 8

# 板块维度细则（申万一级，v2.1 后保持不变）
sector_filter:
  top_n_sectors: 5    # 当日涨幅 TOP N 板块加分（默认 5，命中第 1 +50、第 5 +22）

# 题材维度细则（v2.1 新增，独立维度 dim=theme）
theme_filter:
  top_n_themes: 10
  # 同花顺概念涨幅排名 → 加分（找 ≥ rank 的最小 key）
  ths_rank_bonus:
    1: 50
    2: 42
    3: 35
    4: 28
    5: 22
    10: 12
  # 涨停最强概念排名 → 加分
  limit_concept_rank_bonus:
    1: 50
    3: 35
    5: 22
    10: 12
  # 概念资金净流入 > 0 → 加分
  concept_moneyflow_positive_bonus: 15
  max_theme_bonus: 100  # 三类信号合成上限
