# 部署用：api + nginx（PostgreSQL 已单独部署）
# 使用：DB_URL=postgresql+psycopg2://user:pass@host:5432/dbname docker compose up -d
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mo_stock_api
    restart: unless-stopped
    command: uvicorn mo_stock.web.app:app --host 0.0.0.0 --port 8001
    environment:
      DB_URL: ${DB_URL:?请设置 DB_URL 环境变量}
      WEB_BASIC_AUTH_USERNAME: ${WEB_BASIC_AUTH_USERNAME:-admin}
      WEB_BASIC_AUTH_PASSWORD: ${WEB_BASIC_AUTH_PASSWORD:?请设置 WEB_BASIC_AUTH_PASSWORD 环境变量}
    ports:
      - "8001:8001"

  nginx:
    image: nginx:alpine
    container_name: mo_stock_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
