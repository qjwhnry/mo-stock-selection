; alembic 配置文件（由 env.py 读取）
; 数据库连接串在 env.py 中从 config.settings 动态注入，而非写死在本文件
; 使用：alembic revision --autogenerate -m "描述"  /  alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

; sqlalchemy.url 由 env.py 注入，此处留空
sqlalchemy.url =

[post_write_hooks]
; autogen 生成后自动用 ruff 格式化
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
